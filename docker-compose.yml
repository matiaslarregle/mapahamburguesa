version: "3.9"

services:
  api:
    build: .
    container_name: mapahamburguesa-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      # Hot-reload en dev. En prod, comentar este volumen.
      - ./backend:/app/backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
